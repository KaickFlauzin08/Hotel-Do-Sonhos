Seu código atual tem uma estrutura funcional legal, mas o CSS pode ser otimizado para dar um ar mais "Premium" e moderno.

Abaixo, preparei uma versão Clean & Modern, focada em tipografia legível, cores suaves e um sistema de cards que realmente se destaca. Também corrigi um pequeno detalhe no seu JavaScript: na função mostrarQuarto, o HTML estava sendo acumulado de forma errada dentro do loop, o que causava repetições visuais.

O Novo CSS (Substitua o conteúdo da sua tag <style>)
CSS
:root {
  --primary: #4f46e5;
  --primary-hover: #4338ca;
  --bg-body: #f8fafc;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --white: #ffffff;
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-body);
  color: var(--text-main);
  margin: 0;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Formulário Elegante */
form {
  background: var(--white);
  padding: 30px;
  border-radius: 16px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 400px;
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 50px;
}

input {
  padding: 12px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  transition: all 0.3s ease;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  outline: none;
}

button {
  background-color: var(--primary);
  color: rgb(0, 0, 0);
  padding: 12px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s;
}

button:hover {
  background-color: var(--primary-hover);
}

/* Grid de Cards */
#cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  width: 100%;
  max-width: 1200px;
}

#cards > div {
  background: var(--white);
  padding: 24px;
  border-radius: 12px;
  box-shadow: var(--shadow);
  border: 1px solid #f1f5f9;
}

/* Estilização dos Detalhes (Quartos) */
.detalhes-container {
  margin-top: 15px;
  padding-top: 15px;
  border-top: 1px dashed #e2e8f0;
}

.quarto-item {
  background: #f1f5f9;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
}

.quarto-item h5 { margin: 0; color: var(--primary); }
.quarto-item p { margin: 4px 0 0 0; font-size: 0.9rem; }

h2 { margin: 0 0 10px 0; font-size: 1.4rem; }
p { color: var(--text-muted); margin-bottom: 15px; }
    </style>
  </head>
  <body>
    <form id="cadastro-form">
      <input type="text" id="nome" placeholder="Nome do Hotel" required />
      <input type="number" id="estrelas" placeholder="Quantidade de Estrelas" required  />
      <button type="submit">Cadastrar Hotel</button>
    </form>
    

    <div id="cards"></div>
    <script src="script.js"></script>
  </body>
